<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>课题组GPU预约管理系统</title>
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/element-plus/2.8.0/index.css">
  <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.4.0/vue.global.prod.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/element-plus/2.8.0/index.full.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/axios/1.6.0/axios.min.js"></script>
  <style>
    body{margin:0;padding:20px;background:#f5f7fa;font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;}
    .container{max-width: 1400px;margin:0 auto;}
    .card{padding:20px;background:#fff;border-radius:8px;margin-bottom:20px;box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1);}
    .title { display: flex; align-items: center; margin-bottom: 15px; color: #303133; }
    .title svg { margin-right: 10px; }

    /* --- 表格样式 --- */
    .gpu-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
    .gpu-table th, .gpu-table td {
      border: 1px solid #e4e7ed;
      padding: 12px 8px;
      min-width: 100px;
      height: 60px;
      vertical-align: middle;
    }
    .gpu-table th {
      background-color: #f5f7fa;
      font-weight: 600;
      color: #606266;
      position: relative;
    }
    /* 第一列（显卡号）固定宽度 */
    .gpu-table th:first-child, .gpu-table td:first-child {
      min-width: 120px;
      font-weight: bold;
      background-color: #fafafa;
    }
    /* 单元格状态颜色 */
    .cell-free { background-color: #f0f9eb; color: #67c23a; cursor: pointer; transition: all 0.2s; }
    .cell-free:hover { background-color: #e1f3d8; transform: scale(1.02); }
    .cell-used { background-color: #fef0f0; color: #f56c6c; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app" class="container">
  <div style="background:#409eff;color:white;padding:14px;border-radius:8px;margin-bottom:20px">
    <h2 style="margin:0">课题组GPU预约管理系统</h2>
  </div>

  <!-- 登录界面 -->
  <div v-if="!isLogin" class="card">
    <h3>用户登录</h3>
    <el-form label-width="80px" @submit.prevent="login">
      <el-form-item label="账号">
        <el-input v-model="username" placeholder="请输入账号"></el-input>
      </el-form-item>
      <el-form-item label="密码">
        <el-input v-model="password" type="password" placeholder="请输入密码"></el-input>
      </el-form-item>
      <el-button type="primary" @click="login">登录</el-button>
    </el-form>
  </div>

  <!-- 主功能界面 -->
  <div v-else>
    <!-- 预约表格 -->
    <div class="card">
      <div class="title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        <h3 style="margin:0">GPU 时段预约表</h3>
        <span style="margin-left: 20px; font-size: 14px; color: #606266;">
          <i class="el-icon-circle-check" style="color:#67c23a"></i> 绿色 = 可预约 | 
          <i class="el-icon-circle-close" style="color:#f56c6c"></i> 红色 = 已占用
        </span>
      </div>
      
      <table class="gpu-table">
        <thead>
          <tr>
            <th>显卡编号</th>
            <th v-for="time in timeSlots" :key="time.key">{{ time.name }}</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="gpu in gpuList" :key="gpu.id">
            <td>{{ gpu.name }}</td>
            <!-- 动态生成每个时间段的格子 -->
            <td
              v-for="time in timeSlots"
              :key="`${gpu.id}-${time.key}`"
              :class="{ 'cell-free': isFree(gpu.id, time.key), 'cell-used': !isFree(gpu.id, time.key) }"
              @click="openSelectModal(gpu.id, time.key, time.name)"
            >
              <!-- 这里可以显示简要状态，也可以留空 -->
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 权限申请 -->
    <div class="card">
      <h3>🔐 权限申请（sudo等）</h3>
      <el-form label-width="120px" @submit.prevent>
        <el-form-item label="需要的命令/权限">
          <el-input v-model="permission.desc" type="textarea" rows="2"></el-input>
        </el-form-item>
        <el-form-item label="申请理由">
          <el-input v-model="permission.reason" type="textarea" rows="2"></el-input>
        </el-form-item>
        <el-button type="warning" @click="submitPermission">提交申请</el-button>
      </el-form>
    </div>
  </div>

  <!-- 弹窗：选择用途 -->
  <el-dialog
    title="填写预约用途"
    v-model="selectModal.visible"
    @confirm="submitReservation"
    @close="selectModal = { visible: false, gpuId: '', timeKey: '', timeName: '' }"
  >
    <el-form label-width="80px" model="reserveForm">
      <el-form-item label="显卡">
        <el-input :value="`GPU ${selectModal.gpuId} (${selectModal.timeName})"` disabled></el-input>
      </el-form-item>
      <el-form-item label="用途说明" prop="reason">
        <el-input v-model="reserveForm.reason" type="textarea" rows="3" placeholder="请输入本次实验/任务的用途"></el-input>
      </el-form-item>
    </el-form>
  </el-dialog>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;
const { ElMessage, ElMessageBox } = ElementPlus;

// ============================
// 【对接 Django 后端配置】
// ============================
const API_BASE_URL = "http://127.0.0.1:8000"; // 这里改成同学Django地址

createApp({
  setup() {
    const isLogin = ref(!!localStorage.getItem("token"));
    const username = ref("");
    const password = ref("");
    const reserveList = ref([]); // 存储从后端获取的预约数据

    // 固定配置：8张显卡
    const gpuList = ref([
      { id: "0", name: "GPU 0" },
      { id: "1", name: "GPU 1" },
      { id: "2", name: "GPU 2" },
      { id: "3", name: "GPU 3" },
      { id: "4", name: "GPU 4" },
      { id: "5", name: "GPU 5" },
      { id: "6", name: "GPU 6" },
      { id: "7", name: "GPU 7" }
    ]);

    // 固定配置：4个时间段
    const timeSlots = ref([
      { key: "m1", name: "08:00 - 12:00" },
      { key: "m2", name: "12:00 - 16:00" },
      { key: "m3", name: "16:00 - 20:00" },
      { key: "m4", name: "20:00 - 24:00" }
    ]);

    // 弹窗状态
    const selectModal = reactive({
      visible: false,
      gpuId: "",
      timeKey: "",
      timeName: ""
    });

    // 预约表单数据
    const reserveForm = reactive({
      reason: ""
    });

    // ------------------------------
    // 方法：登录
    // ------------------------------
    const login = async () => {
      try {
        const res = await axios.post(`${API_BASE_URL}/api/accounts/login/`, {
          username: username.value,
          password: password.value
        });
        localStorage.setItem("token", res.data.token);
        isLogin.value = true;
        ElMessage.success("登录成功");
        fetchReserves(); // 登录后加载数据
      } catch (e) {
        ElMessage.error("账号或密码错误");
      }
    };

    // ------------------------------
    // 方法：从后端获取所有预约数据
    // ------------------------------
    const fetchReserves = async () => {
      try {
        const res = await axios.get(`${API_BASE_URL}/api/gpu/reserve/list/`, {
          headers: { Authorization: `Bearer ${localStorage.getItem("token")}` }
        });
        reserveList.value = res.data.data;
      } catch (e) {
        ElMessage.error("加载数据失败");
      }
    };

    // ------------------------------
    // 方法：判断某个格子是否空闲（绿色）
    // ------------------------------
    const isFree = (gpuId, timeKey) => {
      // 遍历所有预约，如果找到匹配的则被占用（红色）
      return !reserveList.value.some(item => 
        item.gpuId === gpuId && item.timeKey === timeKey
      );
    };

    // ------------------------------
    // 方法：点击格子，打开弹窗
    // ------------------------------
    const openSelectModal = (gpuId, timeKey, timeName) => {
      selectModal.gpuId = gpuId;
      selectModal.timeKey = timeKey;
      selectModal.timeName = timeName;
      selectModal.visible = true;
      reserveForm.reason = ""; // 重置表单
    };

    // ------------------------------
    // 方法：提交预约到Django后端
    // ------------------------------
    const submitReservation = async () => {
      if (!reserveForm.reason.trim()) {
        return ElMessage.warning("请输入用途说明");
      }
      
      try {
        await axios.post(
          `${API_BASE_URL}/api/gpu/reserve/submit/`,
          {
            gpu_id: selectModal.gpuId,
            time_key: selectModal.timeKey,
            time_name: selectModal.timeName,
            reason: reserveForm.reason
          },
          { headers: { Authorization: `Bearer ${localStorage.getItem("token")}` } }
        );
        ElMessage.success("预约成功！");
        selectModal.visible = false;
        fetchReserves(); // 刷新数据，表格颜色自动更新
      } catch (e) {
        ElMessage.error("预约失败，请重试");
      }
    };

    // ------------------------------
    // 方法：提交权限申请
    // ------------------------------
    const permission = reactive({ desc: "", reason: "" });
    const submitPermission = async () => {
      try {
        await axios.post(
          `${API_BASE_URL}/api/permission/apply/`,
          {
            apply_content: permission.desc,
            reason: permission.reason
          },
          { headers: { Authorization: `Bearer ${localStorage.getItem("token")}` } }
        );
        ElMessage.success("权限申请已提交");
        permission.desc = "";
        permission.reason = "";
      } catch (e) {
        ElMessage.error("提交失败");
      }
    };

    // 生命周期：页面加载如果已登录，直接获取数据
    onMounted(() => {
      if (isLogin.value) {
        fetchReserves();
      }
    });

    return {
      isLogin, username, password,
      gpuList, timeSlots, reserveList,
      isFree, openSelectModal,
      selectModal, reserveForm, submitReservation,
      login, fetchReserves,
      permission, submitPermission
    };
  }
}).use(ElementPlus).mount('#app');
</script>
</body>
</html>
